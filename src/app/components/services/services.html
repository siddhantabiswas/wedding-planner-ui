<app-page-header [title]="'Our Services'" [subtitle]="'Lorem ipsum dolor sit, amet consectetur adipisicing elit. Velit numquam eligendi quos.'"></app-page-header>

@if (isHome()) {
  <div class="grid grid-cols-2 gap-0 md:gap-2">
    @for (item of services; track $index) {
      <app-service
        [cardTitle]="item.title"
        [imageUrl]="item.imageUrl"
      ></app-service>
    }
  </div>
} @else {
  <div class="grid xs:grid-cols-1 sm:grid-cols-2 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-0 sm:gap-2 md:gap-4 lg:gap-4 xl:gap-4">
    @for (item of services; track $index) {
      <app-service
        [cardTitle]="item.title"
        [cardSubtitle]="item.subtitle"
        [description]="item.description"
        [imageUrl]="item.imageUrl"
        [serviceUrl]="item.serviceUrl"
      ></app-service>
    }
  </div>
}
