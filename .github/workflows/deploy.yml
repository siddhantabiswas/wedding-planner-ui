name: Deploy Angular to S3 and CloudFront

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'  # Triggers on tags like 1.2.3
      - '[0-9]+.[0-9]+.[0-9]+-test-[0-9]+'  # Triggers on tags like 1.2.3-test-4

jobs:
  build-and-deploy:
    runs-on: ubuntu-slim

    steps:
      - name: Validate CloudFront Distribution ID
        env:
          CF_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          if [ -z "$CF_ID" ]; then
            echo "ERROR: CloudFront Distribution ID is empty!"
            exit 1
          else
            echo "Success: CloudFront Distribution ID ${CF_ID:0:5}*********"
          fi

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.12.0' # LTS version when developed
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Angular App
        run: npm run build --configuration=production

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1 # Mumbai region

      # Sync build folder (usually dist/[project-name]/browser) to S3
      # --delete removes files in S3 that are no longer in your local build
      - name: Deploy to S3
        run: aws s3 sync dist/angular-demo/browser s3://${{ secrets.AWS_S3_BUCKET }} --delete

      # Force CloudFront to fetch the new files from S3 immediately
      - name: Invalidate CloudFront Cache
      # Pass the secret into the step's environment
        run: aws cloudfront create-invalidation --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" --paths "/*"
